<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Message</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    input, textarea {
      padding: 10px;
      width: 250px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    #chat, #verify {
      display: none;
    }
  </style>
</head>
<body>

  <h2>Send Anonymous Message</h2>

  <!-- PHONE LOGIN -->
  <div id="login">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter email"><br><br>
  <input type="password" id="password" placeholder="Enter password"><br><br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
  </div>

  <!-- OTP VERIFY -->
  

  <!-- CHAT -->
  <div id="chat">
    <textarea id="message" placeholder="Type your message"></textarea><br>
    <button onclick="sendMessage()">Send Message</button>
  </div>

  <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // 🔥 REPLACE ONLY THIS PART WITH YOUR OWN CONFIG
     const firebaseConfig = {
  apiKey: "AIzaSyCzpYx5aEVoFAoBat2UchqyxsRDOgWB8S0",
  authDomain: "anonymous-app-d1db3.firebaseapp.com",
  projectId: "anonymous-app-d1db3",
  storageBucket: "anonymous-app-d1db3.firebasestorage.app",
  messagingSenderId: "292970978121",
  appId: "1:292970978121:web:9f2683567daa4b780f9898",
  measurementId: "G-VDGTMZ148Z"
};
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();   

    function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Account created!");
      document.getElementById("chat").style.display = "block";
      document.getElementById("login").style.display = "none";
    })
    .catch(err => alert(err.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Logged in!");
      document.getElementById("chat").style.display = "block";
      document.getElementById("login").style.display = "none";
    })
    .catch(err => alert(err.message));
}
    // SEND MESSAGE
    function sendMessage() {
      const user = auth.currentUser;
      const message = document.getElementById("message").value;

      if (!message) {
        alert("Type something");
        return;
      }

      db.collection("messages").add({
        text: message,
        phone: user.phoneNumber,
        createdAt: new Date()
      });

      alert("Message sent!");
      document.getElementById("message").value = "";
    }
  </script>

</body>
</html>
